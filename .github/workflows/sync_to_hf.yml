name: Sync to HuggingFace Space

on:
  push:
    branches:
      - main

jobs:
  sync-to-hf:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to HuggingFace Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git remote add hf https://Executor-Tyrant-Framework:${HF_TOKEN}@huggingface.co/spaces/Executor-Tyrant-Framework/Working-in-a-Codemine
          git push hf main --force
